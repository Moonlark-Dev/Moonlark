# Moonlark QQ adapter 本地反代 - 绕过 SNI 限制
# 上游: https://47.103.25.220:38091
# 本地: http://127.0.0.1:38090

# 只在 WebSocket 时才传 Connection: upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 127.0.0.1:38090;
    server_name localhost;

    proxy_http_version 1.1;
    proxy_set_header Host 47.103.25.220:38091;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # WebSocket 专用（只有客户端发了 Upgrade 头才生效）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # 长连接超时
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass https://47.103.25.220:38091;

        # 关掉上游 SNI 和证书验证
        proxy_ssl_server_name off;
        proxy_ssl_verify off;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }
}
