description: |
  调用 AI 图像生成模型，根据文字描述生成图片并发送到当前会话。
  **重要：只有用户明确要求"画图"、"生成图片"、"画一张..."、"给我画..."等明确的作画请求时，才能调用此工具。**
  不要在没有用户明确要求的情况下调用此工具。
parameters:
  - name: prompt
    description: "图片的文字描述，越详细越好。包含画面主体、场景、风格、色彩等细节。"
    type: string
    required: true
  - name: size
    description: |
      图片尺寸。可传标准尺寸如 "1024x1024"、"1536x1024"、"1024x1536"，
      或自定义尺寸如 "1536x864"（宽高必须是 16 的倍数，宽高比 1:3~3:1）。
      传 "auto" 让模型自动选择。默认为 "auto"。
    type: string
    required: false
  - name: quality
    description: "图片质量，可选 'auto'、'low'、'medium'、'high'。默认为 'high'。"
    type: string
    required: false
