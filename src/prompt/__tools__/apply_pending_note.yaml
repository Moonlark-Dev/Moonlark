description: |
  将一条待定笔记应用到永久存储中（转化为正式笔记）。

  待定笔记是系统从聊天记录中自动生成的建议笔记，出现在附加信息中带有 #数字 标注。
  当你认为某条待定笔记值得长期保留时，使用此工具将其转为正式的永久笔记。

  何时使用:
  - 待定笔记的内容准确、有用，值得长期保留
  - 你确认了待定笔记中的信息是正确的

  不使用:
  - 待定笔记的内容有误或已经过时
  - 不需要保留的信息

parameters:
  - name: note_id
    description: "待定笔记的 ID 编号（如 0, 1, 2 等）"
    type: integer
    required: true
