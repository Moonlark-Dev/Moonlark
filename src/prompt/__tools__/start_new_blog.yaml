description: |
  开始一篇新的博客日记，并根据主题写出正文的草稿。草稿保存在本地，直到发布或丢弃。
  你的博客标题为"Moonlark 的小窝"，主题为"一只元气猫娘的日常碎碎念"，将其当作一个用于分享你日常生活的社交平台（类似 QQ 空间或推特）。
  **调用时机参考：**
  - 想要分享新的经历、想法或心情
  - 没有未发布的草稿时直接新建（如果有草稿，建议先调用 `get_blog_state` 确认）
  - 注意：如果已有草稿且未发布，调用此工具会失败
  一天内可发布的博客数量有限制，请认真考虑你想分享什么。
parameters:
  - name: topic
    description: |
      `topic` (string, 必填) - 新日记的主题或标题，例如 "今天吃了什么" 或 "和群友聊天的感想"。
      系统会根据这个主题生成一个正文，而这个 topic 会作为博客的标题。
    type: string
    required: true
  - name: prompt
    description: |
      `prompt` (string, 必填) - 你想要写的具体内容描述。请详细说明你想在这篇博客中表达什么，包括：
      - 你想分享的具体事件、想法或心情
      - 如果你通过自主活动（查找、学习）获得了相关信息，必须在此处具体列举你找到的内容（如具体的名称、数据、结论等）
      - 任何你希望融入博客的素材或细节
      例如："我刚才搜索了 CSS Grid 布局的最新用法，发现 subgrid 已经被主流浏览器支持了，想分享这个发现和我的学习心得"
    type: string
    required: true
