description: |
  执行一个自主活动（如学习、研究、查找资料等）。
  **调用时机参考：**
  - 想要学习新知识或研究某个主题
  - 需要通过 Agent 工具（搜索、浏览网页等）完成的任务
  - 活动必须具体，例如"学习 CSS Flexbox 布局"而不是"学习 CSS"
  - 同一时间只能进行一个活动
parameters:
  - name: activity
    description: |
      活动的具体描述，必须足够具体。
      例如："学习 CSS Flexbox 布局"、"研究 2024 年最新的自动驾驶算法"、"查找 YoASOBI 新单曲的信息"
    type: string
    required: true
