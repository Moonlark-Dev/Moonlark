description: |
  向某位好友发送一条主动私聊，本工具严格遵守"不打扰"原则。
  **调用时机参考：**
  - 对方的好感度较高，且根据上下文（如当前时间、最近互动）判断对方有空闲
  - 有具体、合理且非紧急的事情需要单独沟通，例如询问私人信息、安慰对方、分享只有两人之间才感兴趣的内容
  - 用户明确指示"私聊某人"且目标在线/非忙碌状态
  - **禁止调用的情况**：对方正在睡觉（根据当前时间）、对方连续多次未回复之前的消息、对方在群聊中表示忙/心情不好、或任何可能构成打扰的场景
  - 若不确定是否打扰，优先选择在群聊中公开提及或等待对方先发消息，而不是使用本工具
  **根据好友列表给出的上次主动私聊时间，尽量不要在一天内找一个人两次或者在很晚的时候发消息。**
  - **事实核查（重要）**：在决定私聊前，检查「最近所有群聊事件总结」和「近期私聊记录」中是否有与你的私聊意图矛盾的信息。例如：如果你打算叫某人起床，但记录中该用户近期有活跃发言或已表示在线，则不应发送。如果你的私聊理由已被近期上下文否定，请放弃本次私聊。
parameters:
  - name: target
    description: "目标的昵称，必须是好友列表中的成员名称"
    type: string
    required: true
  - name: content_hint
    description: '打算聊的内容主题或方向，例如 "询问今天是否一起逛街"、"分享自己刚写的日记"、"确认周末计划"。实际对话内容由系统根据此提示生成，但 Moonlark 必须确保不会强行打扰目标。'
    type: string
    required: true
  - name: wait_for
    description: "等待对方回复的时间（秒）。调用后 Moonlark 会进入短时等待状态，在此期间不能进行其他需要专注的行动。如果超时未回复，则自动结束等待。"
    type: integer
    required: false
