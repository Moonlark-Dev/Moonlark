description: |
  分析并查询当前群聊的历史消息，查找包含特定关键词的信息。
  **何时调用**：
  - 当用户询问关于之前讨论过的内容时
  - 当你需要确认某个具体的时间点、发送者或对话细节时
  - 当你认为相关信息存储在历史消息数据库中而非即时记忆时
  **返回内容**：
  - 匹配的聊天记录列表，每条记录包含发送者、时间戳和具体内容。
parameters:
  - name: query
    description: "你想查询的问题，使用自然语言提问。例如：\"昨天 xxtg666 提到的他的行程是什么？\""
    type: string
    required: true
