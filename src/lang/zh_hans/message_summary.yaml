switch:
  disable: 群消息总结已禁用，将不再记录本群消息。
  enable: 群消息总结已启用。注意：此功能会保存本群最后 2 天的消息。
  unsupported: 不支持在此节点使用该功能。
disabled: 该功能未在此群启用。

help:
  description: 历史消息总结
  details: 使用 AI 总结群聊中的历史消息。读取长度默认为 200 条消息，最大为 270，该功能不支持 QQ 节点且需要在群聊中手动启用。
  usage1: summary [读取长度] (总结历史消息)
  usage2: summary -s broadcast (广播风格总结)
  usage3: summary -s topic (话题梳理)
  usage4: summary -e|-d (功能开关)
  usage5: summary --everyday-summary <on/off> (每日总结开关)
help_neko:
  description: 找猫娘
  details: 根据近 2 天的消息对群友的“猫娘指数”进行打分。
  usage1: neko-finder
help_debate:
  description: 辩论助手
  details: 分析群聊中的争议或辩论，提供客观的双方观点摘要。
  usage1: debate [读取长度]
everyday_summary:
  enable: 每日群消息总结推送已启用（推送时间：6:00）
  disable: 每日群消息总结推送已禁用。
neko:
  no_data: 暂无数据
  x_label: '猫娘分数'
  title: 猫娘分数排行榜
  render_title: 猫娘分数排行榜
  score: 分数
  comment_prefix: "💬"
  first_badge: "🥇 #1"
debate:
  no_conflict: 未检测到争议或辩论内容。
  render_title: 辩论分析报告
  standpoint: 核心立场
  arguments: 主要论据
  implicit: 隐含前提
  fallacies: 逻辑谬误
  analysis_title: Moonlark 分析
help_check_history:
  description: 发过了吗
  details: 检查最近 48 小时内是否已经讨论过某个话题或发送过某条消息。
  usage1: check-history [内容]
  usage2: check-history (回复某条消息)
help_group_daily:
  description: 每日群聊总结
  details: 获取当日群聊的总结报告，需要先启用群消息总结功能。
  usage1: group-daily (获取当日群聊总结)
check_history:
  no_content: 请提供要查询的内容，或回复一条消息。
  no_history: 最近 48 小时内没有聊天记录。
  no_match: 最近 2 天内未找到相关内容。
  title: 历史消息查询结果
  sender: 发送者
  time: 发送时间
  content: 消息内容
mvp_ranking:
  title: MVP 排行榜
  no_data: 暂无数据
decision:
  no_messages: 群内暂无消息记录，无法生成处分通知。
  no_punishment: 请指定处分内容，例如：decision @群友 女装
  generate_failed: 生成处分通知失败，请稍后重试。
help_decision:
  description: 虚假处分通知
  details: 根据群内最近 300 条消息，对指定群员生成一份符合公文格式的虚假处分通知（整活用）。
  usage1: decision @群友 <处分内容>
  example: decision @小明 女装
