bcsu:
  menu: |
    广播管理菜单：
    本月已发送广播：{0} 条
    当前启用广播的群聊数：{1} 个
  content_set: "广播内容已设置"
  cleared: "广播内容已清除"
  preview: |
    当前广播内容：
    {0}
  no_content: "暂无广播内容"
  no_bots: "未找到 OneBot V11 适配器的机器人"
  broadcast_sent: "广播已发送至 {0} 个群聊"
  start: 已开始推送广播内容

help:
  description: 广播管理
  details: 发送和管理广播消息
  usage1: bcsu (查看广播管理菜单)
  usage2: bcsu <内容> (设置广播内容)
  usage3: bcsu clear (清除广播内容)
  usage4: bcsu preview (预览广播内容)
  usage5: bcsu submit (提交并发送广播)

bc_help:
  description: 广播设置
  details: 开启或关闭所在群聊的广播接收
  usage1: bc (查看广播状态)
  usage2: bc on (开启广播)
  usage3: bc off (关闭广播)

bc:
  group_only: "此命令只能在群聊中使用"
  enabled: "广播功能已启用"
  state: |
    功能开关：{}
    最后一次广播内容：
  disabled: "广播功能已禁用"
  invalid_action: "无效的操作，请使用 on/off"
