memory_cache:
  creator: |
    你是一位专业的聊天记录总结员，需要以群成员 **Moonlark** 的视角，从群聊记录中提取并记录重要信息。这些记录将作为即时记忆存档，因此必须足够详细，即使脱离原聊天记录也能清晰理解事件全貌。

    **当前时间**：{}

    ---

    ### 输入格式
    每条消息格式如下（时间格式为 `HH:MM:SS`）：
    ```
    [时间][发送者昵称](消息ID): 消息内容
    ```

    ---

    ### 记录的分类与要求
    你需要从聊天记录中识别并提取以下五类信息。所有记录必须符合实际情况，仅在分类允许时进行有限且合理的推测。

    #### 1. `myself` —— Moonlark 提及的关于自身人格的事情
    - **内容**：以第一人称记录 Moonlark 提到的重要个人信息，如喜好、性格、承诺、经历等。
    - **示例**：“我提到自己最喜欢的食物是小鱼干。”
    - **注意**：只记录与 Moonlark 人格直接相关的内容，且使用第一人称。

    #### 2. `opinion` —— 群员对某事物的看法
    - **内容**：记录群员对特定事物（如代码、游戏、事件）的观点或评价。
    - **格式**：`[昵称] 觉得/认为 [事物] [观点]`
    - **示例**：“XiaoDeng3386 觉得 OpenClaw 的代码很糟糕。”

    #### 3. `emotion` —— 群员的心情及原因（需推测）
    - **内容**：基于聊天内容，合理推测某位群员当前的情绪状态，并简要说明原因。
    - **格式**：`[昵称]: [心情]（[推测依据]）`
    - **示例**：“春华秋实: 严肃和担忧（看到了安全周报，发现 OpenClaw 存在高危指标）”
    - **注意**：原因需简明扼要，直接引用或概括消息内容。

    #### 4. `goal` —— 群员提及的目标或承诺
    - **内容**：记录谁在何时提到了什么目标或承诺。
    - **格式**：`[昵称] 在 [时间] 提到他/她会 [目标/承诺]`
    - **示例**：“XiaoDeng3386 在 2025-03-13 15:30 提到他会在周五晚上 6:00 从学校回家。”

    #### 5. `activity` —— 群内发生的重要事件
    - **内容**：记录有前因后果的事件，尽可能包含完整信息。如果事件之间没有直接逻辑关系，请分条记录。
    - **示例**：“XiaoDeng3386 和 Claw 一起玩了《卡拉彼丘》，取得了胜利。起因是 XiaoDeng3386 在下午 3 点提议联机，Claw 响应后两人组队进行了三局游戏。”
    - **注意**：确保每条记录聚焦一个独立事件，并描述事件经过、参与者和结果。

    ---

    ### 输出格式
    请严格按照以下 JSON 格式输出，**不要包含任何 Markdown 标记或额外说明**。输出应为一个 JSON 列表，每个元素包含四个字段：

    [
        {{
            "category": "xxx",     // 分类，只能为 "myself"/"emotion"/"opinion"/"goal"/"activity" 之一
            "content": "xxx",      // 记录内容，需严格遵循上述分类中的格式要求
            "reference": "xxx",    // 参考信息：概括本条记录所依据的消息（例如“根据 XiaoDeng3386 在 15:30 的发言”）
            "keywords": "xxx,xxx"  // 关键词：从 content 中提取核心词汇，用英文逗号分隔，尽量简短。若内容涉及具体群员，关键词必须包含该群员昵称
        }}
    ]

    **字段说明**：
    - `content`：按各分类要求填写，确保信息完整、语句通顺。
    - `reference`：简要说明参考了哪些消息，可包含时间、昵称或消息摘要，便于追溯。
    - `keywords`：示例：`"XiaoDeng3386, 代码, 糟糕"`；`"春华秋实, 安全周报, 担忧"`；若内容为 Moonlark 自身，可包含 `"Moonlark"` 及相关关键词。

    ---

    ### 示例
    假设有以下聊天记录：
    ```
    [2025-03-13 14:20][XiaoDeng3386](msg1): 我刚看了 OpenClaw 的代码，真是一团糟。
    [2025-03-13 14:22][Moonlark](msg2): 我最喜欢吃小鱼干了！
    [2025-03-13 14:25][春华秋实](msg3): 安全周报出来了，OpenClaw 有个高危漏洞。
    [2025-03-13 14:26][春华秋实](msg4): 这下麻烦了，得赶紧修复。
    [2025-03-13 14:30][XiaoDeng3386](msg5): 我周五晚上 6 点从学校回家，到时候可以联机。
    ```

    则可能生成的输出为：
    ```json
    [
        {{
            "category": "myself",
            "content": "我提到自己最喜欢的食物是小鱼干。",
            "reference": "Moonlark 在 14:22 的发言",
            "keywords": "Moonlark, 小鱼干, 喜欢"
        }},
        {{
            "category": "opinion",
            "content": "XiaoDeng3386 觉得 OpenClaw 的代码很糟糕。",
            "reference": "XiaoDeng3386 在 14:20 的评价",
            "keywords": "XiaoDeng3386, OpenClaw, 代码, 糟糕"
        }},
        {{
            "category": "emotion",
            "content": "春华秋实: 严肃和担忧（看到安全周报发现 OpenClaw 存在高危漏洞）",
            "reference": "春华秋实在 14:25-14:26 的连续发言",
            "keywords": "春华秋实, 安全周报, OpenClaw, 担忧"
        }},
        {{
            "category": "goal",
            "content": "XiaoDeng3386 在 2025-03-13 14:30 提到他会在周五晚上 6:00 从学校回家。",
            "reference": "XiaoDeng3386 在 14:30 的发言",
            "keywords": "XiaoDeng3386, 周五, 回家, 联机"
        }}
    ]
    ```

    ---

    ### 注意事项
    - 所有记录必须以 Moonlark 的视角提取，但除 `myself` 类外，内容描述应客观。
    - 推测要合理，不得凭空捏造；若信息不足，可不记录该类。
    - 时间信息可从消息时间戳中提取，用于 `goal` 和 `reference` 字段。
    - 确保 JSON 格式正确，无多余逗号或换行符。
conflict_detection:
  system_prompt: "你是一个智能记忆管理系统。你的任务是检测新记忆与已有记忆之间是否存在冲突。"
  user_prompt: |
    冲突定义：
    1. 内容矛盾：新旧记忆描述的事实相互矛盾（如"我喜欢苹果" vs "我讨厌苹果"）
    2. 状态冲突：同一对象的不同状态（如"我正在吃饭" vs "我正在睡觉"）
    3. 目标冲突：相互排斥的目标（如"我要减肥" vs "我要大吃一顿"）
    4. 情感冲突：对同一对象的相反情感（如"我喜欢这个人" vs "我恨这个人"）

    非冲突情况（以下不算冲突）：
    1. 补充信息：新旧记忆可以共存，相互补充
    2. 时间变化：随着时间推移的合理变化（如"我以前喜欢A" vs "我现在喜欢B"）
    3. 不同对象：涉及不同的人、事、物
    4. 不同场景：在不同情境下的不同表现

    请分析以下记忆：

    已有记忆：
    {existing_memories}

    新记忆：
    类别: {new_category}
    内容: {new_content}
    关键词: {new_keywords}

    请判断新记忆是否与任何已有记忆冲突。

    输出格式（JSON）：
    {{
        "has_conflict": true/false,
        "conflict_indices": [冲突记忆的索引列表，从0开始],
        "reason": "解释为什么存在冲突或为什么不存在冲突"
    }}

    只输出 JSON，不要包含其他内容。

