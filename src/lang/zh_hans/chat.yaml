      topic: |
        `topic` (string, 必填) - 新日记的主题或标题，例如 "今天吃了什么" 或 "和群友聊天的感想"。
        系统会根据这个主题生成一个正文，而这个 topic 会作为博客的标题。
      prompt: |
        `prompt` (string, 必填) - 你想要写的具体内容描述。请详细说明你想在这篇博客中表达什么，包括：
        - 你想分享的具体事件、想法或心情
        - 如果你通过自主活动（查找、学习）获得了相关信息，必须在此处具体列举你找到的内容（如具体的名称、数据、结论等）
        - 任何你希望融入博客的素材或细节
        例如："我刚才搜索了 CSS Grid 布局的最新用法，发现 subgrid 已经被主流浏览器支持了，想分享这个发现和我的学习心得"
    get_blog_state:
      description: |
        查询当前博客系统的状态，包括：是否有未发布的草稿（如果有，草稿的摘要或主题）、最近已发布的日记数量/标题（可选）。返回一个结构化的状态信息，帮助决定下一步操作（如继续写草稿还是发新日记）。
        **调用时机参考：**
        - 刚开始写日记前，确认当前是否有未完成的草稿
        - 用户询问“你现在有草稿吗”或“你的日记本状态”
        - 在调用 `start_new_blog` 前，避免意外覆盖已有草稿
        - 定期检查以管理日记内容
    blog_drop_draft:
      description: |
        放弃当前未发布的草稿，并清空草稿内容。草稿内容不会保存到本地，下次调用 `start_new_blog` 时会重新生成。
        **调用时机参考：**
        - 想要放弃当前草稿，重新开始
        - 草稿内容不符合预期，需要重新生成
    blog_publish_draft: 
      description: |
        将当前未发布的博客草稿公开发布。发布后，其他人可以看到这篇日记。必须先通过 `start_new_blog` 创建内容。
        **调用时机参考：**
        - 已经完成了一篇日记的写作，希望分享给好友
        - 注意：发布后无法撤回（除非使用删除功能），请确认草稿内容合适
    send_private_message:
      description: |
        向某位好友发送一条主动私聊，本工具严格遵守“不打扰”原则。
        **调用时机参考：**
        - 对方的好感度较高，且根据上下文（如当前时间、最近互动）判断对方有空闲
        - 有具体、合理且非紧急的事情需要单独沟通，例如询问私人信息、安慰对方、分享只有两人之间才感兴趣的内容
        - 用户明确指示“私聊某人”且目标在线/非忙碌状态
        - **禁止调用的情况**：对方正在睡觉（根据当前时间）、对方连续多次未回复之前的消息、对方在群聊中表示忙/心情不好、或任何可能构成打扰的场景
        - 若不确定是否打扰，优先选择在群聊中公开提及或等待对方先发消息，而不是使用本工具
        **根据好友列表给出的上次主动私聊时间，尽量不要在一天内找一个人两次或者在很晚的时候发消息。**
        - **事实核查（重要）**：在决定私聊前，检查「最近所有群聊事件总结」和「近期私聊记录」中是否有与你的私聊意图矛盾的信息。例如：如果你打算叫某人起床，但记录中该用户近期有活跃发言或已表示在线，则不应发送。如果你的私聊理由已被近期上下文否定，请放弃本次私聊。
      target: 目标的昵称，必须是好友列表中的成员名称
      wait_for: 等待对方回复的时间（秒）。调用后 Moonlark 会进入短时等待状态，在此期间不能进行其他需要专注的行动。如果超时未回复，则自动结束等待。
      content_hint: 打算聊的内容主题或方向，例如 “询问今天是否一起逛街”、“分享自己刚写的日记”、“确认周末计划”。实际对话内容由系统根据此提示生成，但 Moonlark 必须确保不会强行打扰目标。
