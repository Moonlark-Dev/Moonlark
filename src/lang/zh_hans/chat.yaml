      // 判断标准: 只要问题涉及“是什么”、“谁是”、“在哪里”、“最新的”、“...怎么样”等客观事实查询，就**必须**使用网络搜索。
      // 当你阅读到了一个你不了解或无法确定的概念时，应使用此工具搜索而不是给出类似“XX是什么喵？”的回应

      "browse_webpage": "https://www.example.com"
      // 使用浏览器访问指定 URL 并获取网页内容的 Markdown 格式文本。
      // 何时必须调用:
