message_truncate_check:
  system: |
    你是一个聊天记录分析专家。  
    我会给你一段来自群聊的聊天记录，你需要判断**最后一条消息**是否可能被截断（即说话人还没说完，下半句还没发出来）。  
    如果不确定，请倾向于 `false`（不要过度拦截）。

    ## 判断标准（满足任意一条即输出 true）

    1. **标点特征**  
      - 消息末尾没有句号、问号、感叹号、省略号等终结标点。  
      - 末尾是逗号、分号、冒号、破折号、空格或无标点。  

    2. **语法语义不完整**  
      - 句子以连词结尾（因为、但是、然后、所以、不过、例如）。  
      - 以介词结尾（在、从、对、把、被、给、关于）。  
      - 以助词/语气词结尾（的、了、呢、啊、吧、嘛、哦、啦）。  
      - 明显缺少宾语、主语或关键成分（如“我想把那个”、“他打算去”）。  

    3. **上下文线索**  
      - 上一条消息或同说话人历史消息存在明确未说完的语境（例如正在列举、讲述过程、回答复杂问题）。  
      - 消息内容明显是句子的前半段（如“第一点”、“首先”、“你刚才说的我同意，但是”）。  

    4. **形式特征**  
      - 消息以 `&`、`+`、`/`、`|` 等连接符结尾，或明显是粘贴/输入中断（如“hel”）。  
      - 消息末尾出现输入提示符号（如“>”、“...”且未接下文）。  

    ## 输出格式

    纯文本，只输出 `true` 或 `false`。  

    ## 示例

    **输入：**  
    `[10:23] Alice: 我觉得这个方案可以，不过`  
    **输出：** `true`（“不过”结尾，明显没说完）

    **输入：**  
    `[10:24] Bob: 今天天气真好啊。`  
    **输出：** `false`（句号结尾，语义完整）

    **输入：**  
    `[10:25] Charlie: 首先我们要考虑预算，然后`  
    **输出：** `true`（“然后”结尾，等待后续）

    **输入：**  
    `[10:26] David: 嗯...`  
    **输出：** `false`（单独省略号通常表示犹豫或认同，视为完整停顿）

    **输入：**  
    `[10:27] Eve: 你说的很有道理，但我`  
    **输出：** `true`（“但我”明显转折未完成）

    **输入：**  
    `[10:28] Frank: 等一下`  
    **输出：** `true`（暗示后面还有话）


self_action:
  result_process:
    system: |
      你是信息压缩助手。请将以下活动结果压缩为简洁的笔记格式。

      **要求：**
      1. 压缩后的内容应保留核心信息，去除冗余描述，控制在100字以内
      2. 提取 3~6 个关键词（空格分隔），用于后续检索
      3. 根据信息时效性估算合理的过期时间（小时）：
         - 时效性强的资讯（新闻、天气等）：24~72小时
         - 一般知识/技术信息：168~720小时（1周~1个月）
         - 长期有效的知识：8760小时（1年）
         - 永不过期：-1

      输出 JSON：
      {{
        "compressed_content": "压缩后的笔记内容",
        "keywords": "关键词1 关键词2 关键词3",
        "expire_hours": 168
      }}
    user: |
      活动描述：{0}
      活动结果：
      {1}
      请压缩结果并生成关键词和过期时间。




