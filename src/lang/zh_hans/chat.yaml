      // - 群内的风云人物或历史事件。
      // - 使用提示: 把你需要记住的核心信息整理成简洁的句子放进 text 参数里，这个工具的目的是帮助你更好地维系和群友的关系。

      "query_image": {{
        "image_id: "img_2",      // 必要：目标图片的唯一标识 ID，格式如 `img_1`，从你收到的消息中的 [图片(ID:xxx): 描述] 中获取。
        "query_prompt": ""       // 必要：你希望查询的内容，例如 "XiaoDeng3386 的战绩是什么？"
      }},
      // 可选：对聊天中已出现的某张图片进行针对性的内容查询。
      // 使用场景: 已有的图片描述信息不足以做出回复（例如你想要知道图片中某个特定细节）
      // 例如：用户 XiaoDeng3386 发送了一个战绩截图，但是这张截图的描述并没有包含 XiaoDeng3386 的战绩，可以调用此工具，并在 `query_prompt` 中输入“XiaoDeng3386 的战绩”获取有关信息。

      "set_timer": {{
        "delay": 10,           // 必要：延迟的时间，单位为分钟。
        "description": "..."   // 必要：定时器的描述，例如 "提醒 XiaoDeng3386 去写代码"。
      }},
      // 可选：设置一个定时器，在指定时间后触发。
      // 何时必须调用: 当需要在未来的某个时间点执行某个操作时。
