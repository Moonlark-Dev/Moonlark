help_model:
  description: 模型管理
  details: 管理 OpenAI 模型配置（仅限超级用户）
  usage1: model (查看模型配置信息)
  usage2: "model <模型名> (更换默认模型)"
  usage3: "model <模型名> <应用标识> (设置应用专用模型)"
  usage4: "model :default: <应用标识> (删除应用配置)"
model:
  no_permission: "权限不足：只有 superuser 可以使用此命令"
  set_default: "✅ 已将默认模型设置为: {0}"
  set_identify: "✅ 已将应用 {0} 的模型设置为: {1}"
  remove_identify: "✅ 已删除应用 {0} 的模型配置，将使用默认模型"
  no_identify_config: "⚠️ 应用 {0} 没有特定的模型配置"
  no_override: "(无特殊配置)"
  models_list_failed: "⚠️ 获取模型列表失败: {0}"
  info: |
    📋 模型配置信息

    🔹 默认模型: {default_model}

    🔹 应用特殊配置:
    {override_list}

    🔹 可用模型列表:
    {models_list}

    📝 使用方法:
      /model - 显示此信息
      /model <模型名> - 更换默认模型
      /model <模型名> <应用标识> - 设置应用模型
      /model :default: <应用标识> - 删除应用配置

ai_whitelist:
  no_permission: "权限不足：只有 superuser 可以使用此命令"
  usage: |
    📝 AI 白名單管理

    使用方法:
      /ai_whitelist - 查看白名單列表
      /ai_whitelist add <群號> - 添加群聊到白名單
      /ai_whitelist remove <群號> - 從白名單移除群聊
      /ai_whitelist enable <群號> - 啟用群聊 AI 功能
      /ai_whitelist disable <群號> - 禁用群聊 AI 功能
  empty: "📋 白名單為空"
  list: |
    📋 AI 白名單列表

    {0}

    共 {1} 個群聊
  already_exists: "⚠️ 群聊 {0} 已在白名單中"
  added: "✅ 已將群聊 {0} 添加到白名單"
  not_found: "⚠️ 未找到群聊 {0}"
  removed: "✅ 已將群聊 {0} 從白名單移除"
  enabled: "✅ 已啟用群聊 {0} 的 AI 功能"
  disabled: "✅ 已禁用群聊 {0} 的 AI 功能"

help_ai_whitelist:
  description: AI 白名單管理
  details: 管理可使用 AI 功能的群聊白名單（僅限超級用戶）
  usage1: ai_whitelist (查看白名單)
  usage2: "ai_whitelist add <群號> (添加)"
  usage3: "ai_whitelist remove <群號> (移除)"
